server:
  port: 8081

spring:
  application:
    name: merchant-service

  # ── MySQL Datasource ────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/merchant_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  # ── JPA / Hibernate ─────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ── Redis ───────────────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # ── Kafka ───────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: merchant-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.paymentgateway.common.*"

# ── Eureka Client ───────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# ── JWT Configuration ───────────────────────────────────────────────────
jwt:
  secret: bXlTdXBlclNlY3JldEtleUZvckpXVFRva2VuU2lnbmluZ1RoYXRJc0F0TGVhc3QyNTZCaXRzTG9uZ0Zvckhtb
  expiration-ms: 86400000  # 24 hours

# ── Logging ─────────────────────────────────────────────────────────────
logging:
  level:
    com.paymentgateway.merchant: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# ── Actuator ────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
