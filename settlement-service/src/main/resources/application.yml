server:
  port: 8085

spring:
  application:
    name: settlement-service

  # -------------------------------------------------------------------------
  # MySQL DataSource
  # -------------------------------------------------------------------------
  datasource:
    url: jdbc:mysql://localhost:3306/settlement_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # -------------------------------------------------------------------------
  # JPA / Hibernate
  # -------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # -------------------------------------------------------------------------
  # Kafka
  # -------------------------------------------------------------------------
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: settlement-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.paymentgateway.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ---------------------------------------------------------------------------
# Eureka Client
# ---------------------------------------------------------------------------
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# ---------------------------------------------------------------------------
# Actuator
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level:
    com.paymentgateway.settlement: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
