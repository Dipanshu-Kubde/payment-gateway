server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: merchant-service
          uri: lb://merchant-service
          predicates:
            - Path=/api/merchants/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/api/transactions/**

        - id: fraud-detection-service
          uri: lb://fraud-detection-service
          predicates:
            - Path=/api/fraud/**

        - id: settlement-service
          uri: lb://settlement-service
          predicates:
            - Path=/api/settlements/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiBpbiB0aGUgcGF5bWVudCBnYXRld2F5IHN5c3RlbQ==}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
